<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meme Maker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

  <div id="topbar">
    <button onclick="resetBoard()">RESET BOARD</button>
    <button onclick="generateImage()">GENERATE</button>
    <button id="outlineBtn" onclick="toggleOutline()">OUTLINE 👁️</button>
    <button id="themeBtn" onclick="toggleTheme()" title="Toggle dark/light">☀️</button>
  </div>
  <div id="container">
    <div id="left">
      <h2>Backgrounds</h2>
      <div id="backgrounds" class="grid"></div>
      <h2>Templates</h2>
      <div id="templates" class="grid"></div>
    </div>
    <div id="center">
      <div id="canvasWrapper">
        <canvas id="memeCanvas"></canvas>
      </div>
      <div id="textInputs">
        <div class="font-and-text">
          <div class="fontControls">
            <div><label><span>Font:</span>
              <select id="fontFamily" onchange="drawMeme()">
                <option>Impact</option>
                <option>Arial</option>
                <option>Comic Sans MS</option>
                <option>Times New Roman</option>
              </select>
            </label></div>
            <div><label><span>Weight:</span>
              <select id="fontWeight" onchange="drawMeme()">
                <option>bold</option>
                <option>normal</option>
                <option>lighter</option>
              </select>
            </label></div>
            <div><label><span>Color:</span>
              <input type="color" id="fontColor" value="#FFFFFF" onchange="drawMeme()">
            </label></div>
            <div><label><span>Size:</span>
              <input type="number" id="fontSize" value="40" min="10" max="120" style="width:60px" onchange="drawMeme()">&nbsp;px
            </label></div>
          </div>
          <div class="text-fields">
            <label>Tekst górny:
              <input type="text" id="topText" placeholder="Top text">
            </label>
            <label>Tekst dolny:
              <input type="text" id="bottomText" placeholder="Bottom text">
            </label>
          </div>
          <div>
            <div style="display:flex; align-items:center; gap:5px;">
              <span>canvas shape:</span><div id="canvasSize" style="font-size:18px;"></div>
            </div>
            <hr>
            <textarea id="freeTextArea" rows="4" cols="28" style="font-size:17px;" placeholder="free text here"></textarea>
          </div>
        </div>
        <div class="button-row">
          <button onclick="drawMeme()">Update Text</button>
          <button onclick="addTextObject()">Add Free Text</button>
        </div>
      </div>
    </div>
    <div id="right">
      <h2>Characters</h2>
      <div id="characters" class="grid"></div>
      <h2>Items</h2>
      <div id="items" class="grid"></div>
    </div>
  </div>
  <a id="downloadLink" style="display:none"></a>
  <script src="script.js"></script>
<footer style="text-align:center; padding: 1em 0;">
  &copy; 2026 &reg; | v0.1.1 | <a href="https://github.com/nosaczo" target="_blank">github.com/nosaczo</a>
</footer>
</body>
</html>
